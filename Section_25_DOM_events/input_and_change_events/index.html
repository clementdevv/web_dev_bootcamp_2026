<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Input & Change Events</title>
</head>
<body>

  <h1>Input & Change Events</h1>

  <h3>1️⃣ Text Input</h3>
  <input type="text" id="textInput" placeholder="Type your name..." />
  <p id="liveOutput"></p>

  <hr>

  <h3>2️⃣ Select Dropdown</h3>
  <select id="colorSelect">
    <option value="">Select a color</option>
    <option value="red">Red</option>
    <option value="blue">Blue</option>
    <option value="green">Green</option>
  </select>

  <p id="colorOutput"></p>

  <script src="index.js"></script>
</body>
</html>
