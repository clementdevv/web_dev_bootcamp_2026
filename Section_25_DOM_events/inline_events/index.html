<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Event Demo</title>
  <script src="index.js"></script>
</head>
<body>

  <h1>Event</h1>

  <!-- Single click event -->
  <button onclick="handleClick()">
    Click Me
  </button>

  <br><br>

  <!-- Double click event -->
  <button ondblclick="handleDoubleClick()">
    Double Click Me
  </button>

</body>
</html>
