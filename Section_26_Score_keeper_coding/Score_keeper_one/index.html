<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Score Keeper</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
</head>
<body>
    <div class="container is-max-desktop mt-6"> <div class="columns is-centered"> <div class="column is-three-quarters-tablet is-half-desktop">
                <div class="card"> <div class="card-image"> <figure class="image is-4by3"> <img src="https://images.unsplash.com/photo-1534158914592-062992fbe900?ixlib=rb-1.2.1&ixid=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=crop&w=1999&q=80" alt="Ping Pong Paddle and Ball" class="has-ratio">
                        </figure>
                    </div>
                    
                    <header class="card-header"> <p class="card-header-title is-4">Ping Pong Score Keeper</p>
                    </header>
                    
                    <div class="card-content"> <div class="content">
                            <h1 class="title is-1"> <span id="p1Display">0</span> to <span id="p2Display">0</span>
                            </h1>
                            <p class="subtitle is-6">Use the buttons below to keep score</p> <div class="field is-grouped mb-5"> <label for="playto" class="label mr-3 mt-1">Playing To </label>
                                <div class="control">
                                    <div class="select is-rounded is-small"> <select id="playto">
                                            <option value="3">3</option>
                                            <option value="4">4</option>
                                            <option value="5">5</option>
                                            <option value="6">6</option>
                                            <option value="7">7</option>
                                            <option value="8">8</option>
                                            <option value="9">9</option>
                                            <option value="10">10</option>
                                            <option value="11">11</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <footer class="card-footer"> <button id="p1Button" class="card-footer-item button is-primary is-large is-light is-fullwidth">+1 Player One</button>
                      <button id="p2Button" class="card-footer-item button is-link is-large is-light is-fullwidth">+1 Player Two</button>
                      <button id="reset" class="card-footer-item button is-danger is-large is-light is-fullwidth">Reset</button>
                    </footer>
                    
                </div>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
