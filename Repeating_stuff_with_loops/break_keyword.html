<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Break Keyword Demo</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: #16213e;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid #0f3460;
        }
        h1 { color: #e94560; }
        code {
            background: #0f3460;
            padding: 4px 8px;
            border-radius: 4px;
            color: #4db8ff;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Break Keyword Game</h1>
        <p>The <code>while(true)</code> loop is running!</p>
        <p>Check the <strong>Console (F12)</strong> to see your attempts.</p>
        <p><em>Refresh the page to restart the game.</em></p>
    </div>

    <script src="break_keyword.js"></script>
</body>
</html>
