
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Todo List</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 8px; max-width: 400px; margin: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; }
        ul { list-style: none; padding: 0; }
        li { background: #ecf0f1; margin: 5px 0; padding: 10px; border-left: 5px solid #3498db; font-weight: bold; }
        code { color: #e74c3c; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Todo List App</h1>
        <p>Type these commands into the prompt:</p>
        <ul>
            <li><code>new</code> - Add a Todo</li>
            <li><code>list</code> - List all Todos</li>
            <li><code>delete</code> - Remove specific Todo</li>
            <li><code>quit</code> - Quit App</li>
        </ul>
        <hr>
        <p><em>Check the Console (F12) to see your list updates!</em></p>
    </div>

    <script src="to_do.js"></script>
</body>
</html>
