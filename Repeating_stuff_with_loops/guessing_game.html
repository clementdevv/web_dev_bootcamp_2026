<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Guessing Game</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #2c3e50;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 30px;
            background: #34495e;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        h1 { color: #f1c40f; }
        .hint { color: #bdc3c7; font-style: italic; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Number Guessing Game</h1>
        <p>I am thinking of a number between 1 and 10...</p>
        <p class="hint">Open the Console (F12) to see game logs.</p>
        <button onclick="location.reload()">Restart Game</button>
    </div>

    <script src="guessing_game.js"></script>
</body>
</html>
